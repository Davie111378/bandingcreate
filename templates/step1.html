<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banding Lab - Step 1/3 上传与基础配置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .navbar .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .navbar .logo-icon {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .navbar-right a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .navbar-right a:hover {
            opacity: 1;
        }

        .navbar-right .avatar {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .stepper {
            margin-top: 80px;
            padding: 24px 32px;
            background: rgba(255, 255, 255, 0.1);
        }

        .stepper-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 48px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: all 0.3s;
        }

        .step.active .step-number {
            background: white;
            color: #667eea;
        }

        .step.inactive .step-number {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .step-label {
            font-size: 14px;
            font-weight: 500;
        }

        .step.active .step-label {
            color: white;
        }

        .step.inactive .step-label {
            color: rgba(255, 255, 255, 0.6);
        }

        .step-line {
            width: 48px;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 32px;
        }

        .drop-zone {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            border: 3px dashed #e5e7eb;
            cursor: pointer;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #667eea;
            background: #f8fafc;
            transform: translateY(-2px);
        }

        .drop-zone .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }

        .drop-zone h3 {
            font-size: 20px;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .drop-zone p {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 24px;
        }

        .drop-zone .btn-primary {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .drop-zone .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        #video-file {
            display: none;
        }

        .video-info {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-top: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            display: none;
        }

        .video-info.active {
            display: block;
        }

        .video-info-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        .video-thumbnail {
            width: 100px;
            height: 60px;
            background: #f3f4f6;
            border-radius: 10px;
            object-fit: cover;
        }

        .video-details {
            flex: 1;
        }

        .video-details h4 {
            font-size: 16px;
            color: #1f2937;
            margin-bottom: 4px;
        }

        .video-details p {
            font-size: 13px;
            color: #6b7280;
        }

        .video-meta {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .meta-item {
            text-align: center;
            padding: 16px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .meta-item .value {
            font-size: 20px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 4px;
        }

        .meta-item .label {
            font-size: 12px;
            color: #6b7280;
        }

        .config-section {
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .config-section h4 {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 16px;
        }

        .config-row {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
        }

        .config-label {
            width: 150px;
            font-size: 14px;
            color: #4b5563;
            font-weight: 500;
        }

        .config-input-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stepper-btn {
            width: 36px;
            height: 36px;
            border: 2px solid #e5e7eb;
            border-radius: 50%;
            background: white;
            color: #6b7280;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stepper-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .number-input {
            width: 120px;
            height: 36px;
            text-align: center;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            color: #1f2937;
            transition: all 0.3s;
        }

        .number-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .output-format {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 8px;
            color: #166534;
            font-size: 14px;
        }

        .footer-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 32px;
        }

        .btn-secondary {
            padding: 12px 24px;
            background: white;
            border: 2px solid #e5e7eb;
            color: #374151;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .btn-next {
            padding: 12px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 32px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 13px;
        }

        .status-bar .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-bar .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: white;
            width: 33%;
            transition: width 0.3s;
        }

        .uploading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .uploading-overlay.active {
            display: flex;
        }

        .uploading-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }

        .uploading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .uploading-content p {
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <div class="logo-icon">🔬</div>
            <span>Banding Lab</span>
        </div>
        <div class="navbar-right">
            <a href="#">帮助文档</a>
            <a href="#">历史任务</a>
            <div class="avatar">U</div>
        </div>
    </div>

    <div class="stepper">
        <div class="stepper-container">
            <div class="step active">
                <div class="step-number">1</div>
                <span class="step-label">上传配置</span>
            </div>
            <div class="step-line"></div>
            <div class="step inactive">
                <div class="step-number">2</div>
                <span class="step-label">光源参数</span>
            </div>
            <div class="step-line"></div>
            <div class="step inactive">
                <div class="step-number">3</div>
                <span class="step-label">批处理导出</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="drop-zone" id="drop-zone">
            <div class="icon">📹</div>
            <h3>上传视频文件</h3>
            <p>支持 MP4、AVI、MOV、MKV 格式，拖拽文件到此处或点击选择</p>
            <label for="video-file" class="btn-primary">
                <span>选择文件</span>
            </label>
            <input type="file" id="video-file" accept=".mp4,.avi,.mov,.mkv">
        </div>

        <div class="video-info" id="video-info">
            <div class="video-info-header">
                <img id="thumbnail" class="video-thumbnail" src="" alt="视频缩略图">
                <div class="video-details">
                    <h4 id="video-name">视频文件名</h4>
                    <p id="video-path">路径信息</p>
                </div>
            </div>

            <div class="video-meta">
                <div class="meta-item">
                    <div class="value" id="resolution">0 × 0</div>
                    <div class="label">分辨率</div>
                </div>
                <div class="meta-item">
                    <div class="value" id="duration">00:00</div>
                    <div class="label">时长</div>
                </div>
                <div class="meta-item">
                    <div class="value" id="total-frames">0</div>
                    <div class="label">总帧数</div>
                </div>
                <div class="meta-item">
                    <div class="value" id="fps">0</div>
                    <div class="label">帧率</div>
                </div>
            </div>

            <div class="config-section">
                <h4>基础配置</h4>
                <div class="config-row">
                    <span class="config-label">提取帧数</span>
                    <div class="config-input-group">
                        <button class="stepper-btn" id="frames-minus">-</button>
                        <input type="number" class="number-input" id="extract-frames" value="15" min="1" max="100">
                        <button class="stepper-btn" id="frames-plus">+</button>
                    </div>
                </div>
                <div class="config-row">
                    <span class="config-label">输出格式</span>
                    <div class="output-format">
                        <span>📄</span>
                        <span>PNG 序列（不可编辑）</span>
                    </div>
                </div>
            </div>

            <div class="footer-actions">
                <button class="btn-secondary" id="btn-reset">重新上传</button>
                <button class="btn-next" id="btn-next" disabled>
                    <span>下一步</span>
                    <span>→</span>
                </button>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status">
            <span class="status-dot"></span>
            <span>系统就绪</span>
        </div>
        <div class="progress-bar">
            <div class="progress-bar-fill"></div>
        </div>
        <span>Step 1/3 - 上传与基础配置</span>
    </div>

    <div class="uploading-overlay" id="uploading-overlay">
        <div class="uploading-content">
            <div class="uploading-spinner"></div>
            <p>正在处理视频，请稍候...</p>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const videoFile = document.getElementById('video-file');
        const videoInfo = document.getElementById('video-info');
        const thumbnail = document.getElementById('thumbnail');
        const videoName = document.getElementById('video-name');
        const videoPath = document.getElementById('video-path');
        const resolution = document.getElementById('resolution');
        const duration = document.getElementById('duration');
        const totalFrames = document.getElementById('total-frames');
        const fps = document.getElementById('fps');
        const extractFrames = document.getElementById('extract-frames');
        const framesMinus = document.getElementById('frames-minus');
        const framesPlus = document.getElementById('frames-plus');
        const btnReset = document.getElementById('btn-reset');
        const btnNext = document.getElementById('btn-next');
        const uploadingOverlay = document.getElementById('uploading-overlay');

        let videoData = null;

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        videoFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        framesMinus.addEventListener('click', () => {
            const current = parseInt(extractFrames.value);
            if (current > 1) {
                extractFrames.value = current - 1;
            }
        });

        framesPlus.addEventListener('click', () => {
            const current = parseInt(extractFrames.value);
            if (current < 100) {
                extractFrames.value = current + 1;
            }
        });

        btnReset.addEventListener('click', () => {
            videoFile.value = '';
            videoInfo.classList.remove('active');
            videoData = null;
            btnNext.disabled = true;
        });

        btnNext.addEventListener('click', () => {
            if (!videoData) return;
            
            uploadingOverlay.classList.add('active');
            
            const formData = new FormData();
            formData.append('video_file', videoData);
            formData.append('extract_frames', extractFrames.value);
            
            fetch('/step1', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect;
                }
            })
            .catch(error => {
                uploadingOverlay.classList.remove('active');
                alert('上传失败，请重试');
            });
        });

        function handleFile(file) {
            const validExtensions = ['.mp4', '.avi', '.mov', '.mkv'];
            const extension = file.name.toLowerCase().substring(file.name.lastIndexOf('.'));
            
            if (!validExtensions.includes(extension)) {
                alert('请上传有效的视频文件（MP4、AVI、MOV、MKV）');
                return;
            }

            videoData = file;
            videoName.textContent = file.name;
            videoPath.textContent = file.size > 1024 * 1024 
                ? (file.size / (1024 * 1024)).toFixed(2) + ' MB' 
                : (file.size / 1024).toFixed(2) + ' KB';

            const video = document.createElement('video');
            video.onloadedmetadata = () => {
                resolution.textContent = `${video.videoWidth} × ${video.videoHeight}`;
                
                const dur = video.duration;
                const mins = Math.floor(dur / 60);
                const secs = Math.floor(dur % 60);
                duration.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                totalFrames.textContent = Math.floor(video.duration * video.fps);
                fps.textContent = video.fps;

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                video.currentTime = 0;
                video.onseeked = () => {
                    ctx.drawImage(video, 0, 0);
                    thumbnail.src = canvas.toDataURL('image/png');
                };
                video.currentTime = 0;

                videoInfo.classList.add('active');
                btnNext.disabled = false;
            };
            video.src = URL.createObjectURL(file);
        }
    </script>
</body>
</html>
